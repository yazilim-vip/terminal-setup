# ── Prefix ─────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Core ───────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -g extended-keys always
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'xterm*:RGB'   # truecolor (24-bit) — Catppuccin needs it to render exactly
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g focus-events on
set -g status-position bottom

# ── Splits ─────────────────────────────────────────────
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# ── Pane navigation (no prefix) ───────────────────────
bind -n M-j select-pane -L
bind -n M-k select-pane -D
bind -n M-i select-pane -U
bind -n M-l select-pane -R

# ── Pane swap (prefix) ────────────────────────────────
bind j swap-pane -d -t '{left-of}'
bind k swap-pane -d -t '{down-of}'
bind i swap-pane -d -t '{up-of}'
bind l swap-pane -d -t '{right-of}'

# ── Pane resize ────────────────────────────────────────
unbind -n M-Left
unbind -n M-Down
unbind -n M-Up
unbind -n M-Right

# ── Pane actions ──────────────────────────────────────
bind z resize-pane -Z
bind x kill-pane
bind m command-prompt -p "move pane to window:" "join-pane -t :'%%'"
bind M command-prompt -p "merge window here:" "join-pane -s :'%%' -h"

# ── Pane join (merge with neighbor) ───────────────────
bind C-j join-pane -v -t '{left-of}'
bind C-l join-pane -v -t '{right-of}'
bind C-i join-pane -h -t '{up-of}'
bind C-k join-pane -h -t '{down-of}'

# ── Windows ───────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind -n M-0 new-window -c "#{pane_current_path}"
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind p previous-window
bind < swap-window -d -t -1
bind > swap-window -d -t +1
bind -n M-r command-prompt -I "#W" "rename-window -- '%%'"
bind -n M-n command-prompt -I "#S" "rename-session -- '%%'"

# ── Sessions ──────────────────────────────────────────
bind n command-prompt -p "new session:" "new-session -s '%%' -c '#{pane_current_path}'"
bind R source-file ~/.tmux.conf \; display "Config reloaded"

# ── Search ────────────────────────────────────────────
unbind -n M-f
bind / copy-mode \; send-keys /

# ── Plugins ───────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'christoomey/vim-tmux-navigator'

# ── Catppuccin ────────────────────────────────────────
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "default"
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_current_number "#I"
set -g @catppuccin_window_current_number_color "#{@thm_mauve}"
set -g @catppuccin_window_current_text_color "#{@thm_surface_1}"
set -g @catppuccin_session_color "#{?client_prefix,#{E:@thm_red},#{E:@thm_green}}"
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"

# ── Plugin settings ───────────────────────────────────
set -g @continuum-restore 'on'
set -g @sessionx-bind 'o'

# ── TPM init (keep at bottom) ─────────────────────────
run '~/.tmux/plugins/tpm/tpm'
